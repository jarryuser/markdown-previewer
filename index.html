<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Previewer</title>
  <link rel="icon" href="/favicon.png" sizes="any" />
  <link rel="stylesheet" href="/src/style.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
    id="hljs-theme"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
  />
  <script defer src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
</head>
<body>
  <header class="toolbar">
    <span class="logo">MD</span>
    <span class="toolbar-title">Markdown Previewer</span>
    <div class="toolbar-actions">
      <span id="word-count" class="stat">0 words</span>
      <span id="char-count" class="stat">0 chars</span>
      <button id="copy-btn">Copy MD</button>
      <button id="export-btn">Export</button>
      <button id="clear-btn">Clear</button>
      <button id="open-file-btn" title="Open local .md file">Open File</button>
      <button id="open-dir-btn" title="Open local directory">Open Dir</button>
      <button id="save-file-btn" title="Save file (Mod+S)" style="display:none">Save</button>
      <span id="open-file-name" class="stat" style="display:none"></span>
      <button id="find-btn" title="Find / Replace (Mod+F)">Find</button>
      <button id="font-dec-btn" title="Decrease font size">A−</button>
      <button id="font-inc-btn" title="Increase font size">A+</button>
      <button id="wrap-btn">Wrap</button>
      <button id="scroll-btn">Sync</button>
      <button id="toc-btn" title="Table of contents">TOC</button>
      <button id="vim-btn">Vim</button>
      <button id="fullscreen-btn">Full ⛶</button>
      <button id="print-btn" title="Print or export as PDF">Print</button>
      <button id="theme-btn" title="Switch color theme">Dark</button>
    </div>
  </header>

  <div id="panes">
    <div id="editor" aria-label="Markdown editor"></div>

    <div id="divider" role="separator" aria-label="Resize panes"></div>

    <div id="preview-pane">
      <div id="preview" class="prose" aria-label="Preview"></div>
      <div id="toc" aria-label="Table of contents"></div>
    </div>
  </div>

  <!-- File System Access: directory overlay -->
  <div id="fsa-overlay" aria-label="Directory viewer">
    <aside id="fsa-sidebar">
      <div class="sidebar-header">
        <span id="fsa-dir-name" class="sidebar-title"></span>
        <button id="fsa-collapse-btn" class="collapse-btn" title="Collapse all">−</button>
        <button id="fsa-close-btn" class="collapse-btn" title="Close folder">✕</button>
      </div>
      <div id="fsa-search-bar">
        <input id="fsa-search-input" type="text" placeholder="Filter files..." autocomplete="off" spellcheck="false" />
      </div>
      <div id="fsa-tree"></div>
    </aside>
    <div id="fsa-sidebar-resize"></div>
    <main id="fsa-content">
      <div id="fsa-nav">
        <button id="fsa-back-btn" class="nav-btn" disabled>←</button>
        <button id="fsa-fwd-btn" class="nav-btn" disabled>→</button>
        <div id="fsa-breadcrumb" class="fsa-breadcrumb"></div>
      </div>
      <div id="fsa-scroll">
        <div class="prose" id="fsa-prose"><p style="color:var(--text-muted)">Select a file from the sidebar</p></div>
      </div>
    </main>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
